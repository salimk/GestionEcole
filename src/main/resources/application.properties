# Nom logique de l'application (utilisé dans les logs, Actuator, etc.)
spring.application.name=GestionEcole

# URL JDBC de la base. Format générique:
# jdbc:mysql://<hôte>:<port>/<nom_bdd>?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# Exemple recommandé (commenté) avec paramètres pour éviter les avertissements de timezone:
# spring.datasource.url=jdbc:mysql://localhost:3306/gestecole?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://localhost:3306/gestecole

# Identifiants de connexion à la base (à externaliser en prod).
spring.datasource.username=root
spring.datasource.password=

# Driver JDBC pour MySQL 8+ (auto-détecté par Spring Boot, conservé ici à titre explicatif).
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Stratégie de gestion du schéma:
# - none       : ne touche pas au schéma
# - validate   : vérifie la correspondance entités <-> schéma
# - update     : applique automatiquement les évolutions (pratique en dev)
# - create     : recrée le schéma à chaque démarrage
# - create-drop: idem create + suppression à l'arrêt
spring.jpa.hibernate.ddl-auto=update

# Affichage des requêtes SQL dans les logs (utile en dev)
# spring.jpa.show-sql=true
 spring.jpa.properties.hibernate.format_sql=true

# Désactive le pattern "Open Session in View" (recommandé en prod)
# spring.jpa.open-in-view=false
# Dialecte Hibernate (généralement auto-détecté; laissez commenté sauf besoin spécifique)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -----------------------------------------------------------------------------
# 4) Serveur Web & Journalisation (optionnels)
# -----------------------------------------------------------------------------
# Port HTTP du serveur embarqué
server.port=8080

# Niveaux de logs globaux
# logging.level.root=INFO
# logging.level.org.springframework=INFO

# Debug SQL détaillé (à n'activer qu'en dev)
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE
